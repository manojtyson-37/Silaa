services:
  app:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "8000:8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:8000
    depends_on:
      - app
